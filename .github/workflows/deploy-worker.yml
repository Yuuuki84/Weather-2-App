name: Cloudflare Worker デプロイ

on:
  push:
    branches: [main]
    paths:
      - 'chat-worker/**'
  workflow_dispatch:  # GitHub Actions 画面から手動実行可能

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Wrangler をインストール
        run: npm install -g wrangler

      - name: Cloudflare Worker をデプロイ
        working-directory: chat-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: wrangler deploy
