name: GitHub Pages デプロイ

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: config.js を Secrets から生成
        env:
          WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_TTS_KEY: ${{ secrets.GOOGLE_TTS_KEY }}
          GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
          CHAT_API_URL: ${{ secrets.CHAT_API_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          printf '// このファイルはデプロイ時に自動生成されます\nconst WEATHER_API_KEY  = "%s";\nconst GEMINI_API_KEY   = "%s";\nconst GNEWS_API_KEY    = "%s";\nconst GOOGLE_TTS_KEY   = "%s";\nconst CHAT_API_URL     = "%s";\nconst SUPABASE_URL     = "%s";\nconst SUPABASE_ANON_KEY = "%s";\n' \
            "$WEATHER_API_KEY" "$GEMINI_API_KEY" "$GNEWS_API_KEY" "$GOOGLE_TTS_KEY" "$CHAT_API_URL" "$SUPABASE_URL" "$SUPABASE_ANON_KEY" > config.js

      - name: GitHub Pages の設定
        uses: actions/configure-pages@v4

      - name: アーティファクトとしてアップロード
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: GitHub Pages にデプロイ
        id: deployment
        uses: actions/deploy-pages@v4
