<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b"/>
      <stop offset="100%" style="stop-color:#312e81"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
  </defs>
  <!-- 背景 -->
  <rect width="192" height="192" rx="40" fill="url(#bg)"/>
  <!-- 雲 -->
  <ellipse cx="96" cy="90" rx="38" ry="22" fill="url(#accent)" opacity="0.9"/>
  <ellipse cx="74" cy="98" rx="22" ry="16" fill="url(#accent)" opacity="0.9"/>
  <ellipse cx="118" cy="98" rx="22" ry="16" fill="url(#accent)" opacity="0.9"/>
  <ellipse cx="96" cy="104" rx="44" ry="18" fill="url(#accent)" opacity="0.9"/>
  <!-- 太陽 -->
  <circle cx="140" cy="58" r="18" fill="#fbbf24" opacity="0.95"/>
  <line x1="140" y1="34" x2="140" y2="28" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
  <line x1="140" y1="82" x2="140" y2="88" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
  <line x1="116" y1="58" x2="110" y2="58" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
  <line x1="164" y1="58" x2="170" y2="58" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
  <!-- L & E テキスト -->
  <text x="96" y="152" text-anchor="middle" font-family="serif" font-size="22" font-weight="bold" fill="#e0e7ff" letter-spacing="2">L &amp; E</text>
</svg>
